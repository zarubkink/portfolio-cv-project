# Minimal mosquitto config for the agro_tracking stack.
# Listens on the docker-network-only port 1883 (no auth); the api,
# mqtt_consumer and edge all talk to the broker through this
# service. For a production deployment add a password_file and
# point MQTT_USERNAME / MQTT_PASSWORD at the api/consumer env.

persistence true
persistence_location /mosquitto/data/

log_dest stdout
log_type error
log_type warning
log_type notice
log_type information

listener 1883
allow_anonymous true
