services:
  db:
    image: postgres:${POSTGRES_DOCKER_TAG}
    restart: unless-stopped
    env_file: stack.env
    volumes:
      - ./data/database:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT}:5432"
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: agro-tracking:local
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: stack.env
    environment:
      DB_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    volumes:
      - ./data/videos:/app/data/videos
      - ./data/failed_videos:/app/data/failed_videos
      - ./data/queue:/app/data/queue
    ports:
      - "8000:8000"
    command: ["uv", "run", "uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "8000"]
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    # The ArUco pipeline runs in a ProcessPoolExecutor sized by
    # MAX_PROCESS_WORKERS (see stack.env.example). Each worker forks
    # from the api process, so leave headroom for the parent too.
    # `shm_size` raises /dev/shm — OpenCV's VideoCapture needs more
    # than the docker default of 64 MiB for high-resolution clips.
    shm_size: "512m"
    deploy:
      resources:
        limits:
          # Cap CPU so a runaway pool can't starve other containers.
          # Set to MAX_PROCESS_WORKERS + 2 (one for uvicorn + one slack).
          cpus: "6"
          memory: 2G

  ingestion:
    image: agro-tracking:local
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    env_file: stack.env
    volumes:
      - ./data/queue:/app/data/queue
      - ./data/videos:/app/data/videos
      - ./data/failed_videos:/app/data/failed_videos
    command: ["uv", "run", "python", "-m", "ingestion.main"]
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
