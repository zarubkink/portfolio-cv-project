name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-checks:
    name: Lint / Format / Alembic drift
    runs-on: ubuntu-latest

    services:
      db:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: agro
          POSTGRES_PASSWORD: agro
          POSTGRES_DB: agro
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U agro -d agro"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DB_URL: postgresql+asyncpg://agro:agro@localhost:5432/agro

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Setup Python
        run: uv python install

      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock', 'pyproject.toml') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Install dependencies
        run: uv sync --frozen

      - name: Ruff check
        run: uv run ruff check src/ ingestion/ scripts/

      - name: Ruff format check
        run: uv run ruff format --check src/ ingestion/ scripts/

      - name: Wait for Postgres
        run: |
          for i in {1..30}; do
            pg_isready -h localhost -p 5432 -U agro && exit 0
            sleep 1
          done
          echo "Postgres not ready" && exit 1

      - name: Alembic upgrade head
        run: uv run alembic upgrade head

      - name: Alembic drift check
        run: uv run alembic check
